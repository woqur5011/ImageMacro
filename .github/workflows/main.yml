name: Build Macro

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1
      - name: Restore NuGet Packages
        run: nuget restore Macro.sln
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Build
        run: msbuild Macro.sln /p:Configuration=Release /p:Platform="x64"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macro-Release
          path: Macro/bin/x64/Release/
