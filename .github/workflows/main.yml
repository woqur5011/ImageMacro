name: Build Macro

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: NuGet restore
        run: nuget restore Macro.sln

      - name: Build
        run: msbuild Macro.sln /p:Configuration=Release /p:Platform=x64

      - name: Collect files
        shell: pwsh
        run: |
          $out = "Macro/bin/x64/Release"
          $dest = "Release/exe"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "$out/*" -Destination $dest -Recurse -Force
          Get-ChildItem $dest | Select-Object Name, Length | Format-Table

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageMacro-x64
          path: Release/exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ImageMacro-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: Release/exe/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}