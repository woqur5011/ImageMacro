name: Build Macro

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  SOLUTION: Macro.sln
  CONFIG: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: NuGet Package Restore
        run: nuget restore ${{ env.SOLUTION }}

      - name: Build Release (x86)
        run: >
          msbuild ${{ env.SOLUTION }}
          /p:Configuration=${{ env.CONFIG }}
          /p:Platform=x86
          /p:OutputPath=Macro/bin/x86/${{ env.CONFIG }}/
          /p:IntermediateOutputPath=Macro/obj/x86/${{ env.CONFIG }}/

      - name: Build Release (x64)
        run: >
          msbuild ${{ env.SOLUTION }}
          /p:Configuration=${{ env.CONFIG }}
          /p:Platform=x64
          /p:OutputPath=Macro/bin/x64/${{ env.CONFIG }}/
          /p:IntermediateOutputPath=Macro/obj/x64/${{ env.CONFIG }}/

      - name: Show Release/exe contents
        run: dir Release\exe /B 2>$null; if (!$?) { echo "(not found)" }

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          $exe = "Release/exe"
          if (Test-Path $exe) {
            Compress-Archive -Path "$exe\*" -DestinationPath "ImageMacro-x64.zip" -Force
            Write-Host "Created ImageMacro-x64.zip from Release/exe/"
          } else {
            Compress-Archive -Path "Macro/bin/x64/Release/*" -DestinationPath "ImageMacro-x64.zip" -Force
            Write-Host "Created ImageMacro-x64.zip from Macro/bin/x64/Release/"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageMacro-x64
          path: ImageMacro-x64.zip
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ImageMacro-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ImageMacro-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}