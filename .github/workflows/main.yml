name: Build Macro

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Build
        run: msbuild Macro.sln /p:Configuration=Release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macro-Release
          path: Macro/bin/Release/
